kind = "web"
previewPath = "/"
title = "Fair Teams"
version = "1.0.0"
id = "artifacts/fair-teams"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22366

[services.development]
run = "pnpm --filter @workspace/fair-teams run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fair-teams", "run", "build" ]
publicDir = "artifacts/fair-teams/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22366"
BASE_PATH = "/"
